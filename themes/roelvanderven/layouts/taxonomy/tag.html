{{ define "main" }}
<article class="page">
  <header class="page-header">
    <h1>Posts tagged: {{ .Title }}</h1>
  </header>

  <section class="post-list">
    {{ range .Pages }}
      {{- partial "post-card.html" . -}}
    {{ end }}
  </section>

  {{ template "_internal/pagination.html" . }}
</article>
{{ end }}
